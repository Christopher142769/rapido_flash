services:
  # Backend Service
  - type: web
    name: rapido-flash-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL_1
        sync: false
      - key: FRONTEND_URL_2
        sync: false
      - key: FRONTEND_URL_3
        sync: false
      - key: FRONTEND_URL_4
        sync: false
      - key: KKIAPAY_PRIVATE_KEY
        sync: false
      - key: KKIAPAY_SECRET
        sync: false

  # Frontend Service 1
  - type: static
    name: rapido-flash-frontend-1
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        sync: false
      - key: REACT_APP_BASE_URL
        sync: false
      - key: REACT_APP_KKIAPAY_PUBLIC_KEY
        sync: false

  # Frontend Service 2
  - type: static
    name: rapido-flash-frontend-2
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        sync: false
      - key: REACT_APP_BASE_URL
        sync: false
      - key: REACT_APP_KKIAPAY_PUBLIC_KEY
        sync: false

  # Frontend Service 3
  - type: static
    name: rapido-flash-frontend-3
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        sync: false
      - key: REACT_APP_BASE_URL
        sync: false
      - key: REACT_APP_KKIAPAY_PUBLIC_KEY
        sync: false

  # Frontend Service 4
  - type: static
    name: rapido-flash-frontend-4
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        sync: false
      - key: REACT_APP_BASE_URL
        sync: false
      - key: REACT_APP_KKIAPAY_PUBLIC_KEY
        sync: false
